<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600&family=Source+Serif+4:ital,opsz,wght@0,8..60,800;1,8..60,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; background: #0A0A0A; overflow: hidden; position: relative; font-family: 'Bricolage Grotesque', sans-serif; }
  .frame {
    position: absolute; inset: 28px;
    border: 1px solid rgba(196, 150, 60, 0.28);
    border-radius: 6px;
  }
  .watermark {
    position: absolute; right: -60px; bottom: -190px;
    font-family: 'Source Serif 4', serif; font-style: italic; font-weight: 700;
    font-size: 760px; line-height: 1; color: rgba(196, 150, 60, 0.05);
    user-select: none;
  }
  .brand {
    position: absolute; top: 64px; left: 72px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 20px; font-weight: 700; letter-spacing: 0.14em; color: #E8E4DF;
  }
  .brand span { color: #C4963C; }
  .tag {
    position: absolute; top: 66px; right: 72px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 15px; letter-spacing: 0.2em; color: #8A8A8A; text-transform: uppercase;
  }
  .center { position: absolute; left: 72px; top: 178px; width: 980px; }
  .eyebrow {
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 16px; letter-spacing: 0.24em; color: #C4963C;
    text-transform: uppercase; margin-bottom: 30px;
  }
  h1 {
    font-family: 'Source Serif 4', serif; font-weight: 800;
    font-size: 84px; line-height: 1.06; letter-spacing: -0.02em; color: #E8E4DF;
  }
  h1 em { font-style: italic; font-weight: 700; color: #C4963C; }
  .rule { width: 56px; height: 3px; background: #C4963C; border-radius: 2px; margin-top: 42px; }
  .footer-row {
    position: absolute; left: 72px; bottom: 62px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    font-size: 15px; letter-spacing: 0.18em; color: #8A8A8A; text-transform: uppercase;
  }
  .footer-row b { color: rgba(196, 150, 60, 0.85); font-weight: 400; }
</style>
</head>
<body>
  <div class="watermark">E</div>
  <div class="frame"></div>
  <div class="brand">el<span>.</span>camino</div>
  <div class="tag">Para Eliel · 2026</div>
  <div class="center">
    <div class="eyebrow">A twelve-month route into IT</div>
    <h1>You want out.<br>This is <em>the route.</em></h1>
    <div class="rule"></div>
  </div>
  <div class="footer-row">No degree required <b>·</b> Security+ <b>·</b> Linux+ <b>·</b> DoD-ready <b>·</b> <b>Dale gas.</b></div>
</body>
</html>
