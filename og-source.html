<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@1,8..60,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px; background: #0A0A0A;
    overflow: hidden; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .frame { position: absolute; inset: 26px; border: 1px solid rgba(196, 150, 60, 0.25); border-radius: 6px; }
  .dollar {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic; font-weight: 700;
    font-size: 460px; line-height: 1; color: #C4963C;
    padding-bottom: 30px;
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <div class="dollar">$</div>
</body>
</html>
